# Save this as:  .github/workflows/metrics.yml   (in your profile repo: hailetrung/hailetrung)
#
# Setup (one time):
#   1. Create a classic Personal Access Token:
#      GitHub -> Settings -> Developer settings -> Personal access tokens (classic) -> Generate new
#      Scopes: repo  (or just public_repo),  read:org,  read:user
#   2. Add it as a repo secret named METRICS_TOKEN:
#      Repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#   3. Commit this file, then run it once:  Actions tab -> Metrics -> Run workflow
#      It generates and commits `github-metrics.svg` to the repo.
#   4. Your README already references ./github-metrics.svg — it renders after that first run.

name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"        # refresh daily at 00:00 UTC
  workflow_dispatch:            # allow manual runs from the Actions tab
  push:
    branches: ["main"]          # change to "master" if that's your default branch

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: hailetrung
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Ho_Chi_Minh

          # Top languages
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Contribution calendar (nice isometric heatmap)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Lines of code changed
          plugin_lines: yes
